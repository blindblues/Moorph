<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moorph Admin | Gestione Progetti</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div id="app">
        <!-- Background Elements -->
        <div class="bg-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <header class="admin-header glass-card">
            <div class="logo">Moorph Admin</div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button id="btn-create-project" class="btn-primary" style="padding: 12px 24px; font-size: 0.95rem;">
                    + Nuovo Progetto
                </button>
            </div>
        </header>

        <main class="admin-main">
            <!-- Sidebar: Project List -->
            <aside id="admin-sidebar" class="sidebar glass-card">
                <h2
                    style="font-size: 1.3rem; font-weight: 700; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 15px;">
                    I tuoi Progetti
                </h2>
                <ul id="project-list" class="project-list">
                    <!-- Projects injected by JS -->
                </ul>
            </aside>

            <!-- Detail Panel -->
            <section id="project-detail" class="project-detail glass-card hidden">
                <!-- Back button (mobile only) -->
                <button class="btn-back" id="btn-back">
                    ← Torna ai Progetti
                </button>

                <div class="detail-header">
                    <div>
                        <h1 id="detail-name" style="margin: 0; font-size: 1.8rem; font-weight: 800;">Nome Progetto</h1>
                        <p style="margin-top: 6px; font-size: 0.85rem; color: var(--text-dim);">ID: <span id="detail-id"
                                style="font-family: monospace; color: var(--secondary);"></span></p>
                    </div>
                    <div class="project-actions">
                        <button id="btn-delete-project" class="btn-danger">🗑 Elimina Progetto</button>
                    </div>
                </div>

                <!-- Share Link -->
                <div class="glass-card" style="padding: 20px; background: rgba(255,255,255,0.01);">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 10px;">🔗 Link di
                        Condivisione</label>
                    <input type="text" id="share-link-input" readonly
                        style="width: 100%; font-family: monospace; font-size: 0.85rem; color: var(--secondary); cursor: text; user-select: all;"
                        value="Seleziona progetto per generare il link" />
                    <button id="btn-copy-url" class="btn-small" style="margin-top: 10px; width: 100%;">📋 Copia
                        Link</button>
                </div>

                <!-- Password Config -->
                <div class="glass-card" style="padding: 24px; background: rgba(255,255,255,0.01);">
                    <label style="font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 12px;">
                        🔑 Password Accesso Utente
                    </label>
                    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="edit-password" placeholder="Imposta password"
                            style="flex: 1; min-width: 180px;" />
                        <button id="btn-save-password" class="btn-primary"
                            style="padding: 10px 20px; font-size: 0.85rem;">Salva Password</button>
                    </div>
                </div>

                <!-- Image Management -->
                <div class="image-management">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h2 style="margin: 0; font-size: 1.3rem; font-weight: 700;">🖼 Galleria Immagini</h2>
                        <p id="image-count" style="font-size: 0.85rem; color: var(--text-dim); margin: 0;"></p>
                    </div>

                    <div class="glass-card"
                        style="padding: 20px; background: rgba(255,255,255,0.03); margin-bottom: 20px;">
                        <label
                            style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 10px;">Aggiungi
                            Immagine tramite URL</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="image-url-input" placeholder="https://esempio.com/immagine.jpg"
                                style="flex: 1;" />
                            <button id="btn-add-url" class="btn-primary" style="padding: 10px 20px;">Aggiungi</button>
                        </div>
                    </div>

                    <div id="bulk-actions-bar" class="hidden"
                        style="margin-bottom: 20px; padding: 10px; background: rgba(255,59,59,0.05); border: 1px solid rgba(255,59,59,0.1); border-radius: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button id="btn-select-all" class="btn-small"
                                style="font-size: 0.75rem; background: rgba(255,255,255,0.1);">✅ Seleziona
                                Tutti</button>
                            <button id="btn-deselect-all" class="btn-small"
                                style="font-size: 0.75rem; background: rgba(255,255,255,0.05);">❌ Deseleziona</button>
                            <span id="selected-count" style="font-size: 0.8rem; font-weight: 600; margin-left:8px;">0
                                selezionati</span>
                        </div>
                        <button id="btn-delete-selected" class="btn-danger btn-small"
                            style="font-size: 0.75rem; padding: 6px 15px;">🗑 Rimuovi Selezionati</button>
                    </div>

                    <div id="image-grid" class="image-grid">
                        <!-- Images injected by JS -->
                    </div>
                </div>

                <!-- Results Section -->
                <div class="results-section" style="margin-top: 40px;">
                    <h2 style="margin-bottom: 20px; font-size: 1.3rem; font-weight: 700;">📊 Preferenze Raccolte</h2>
                    <div id="results-summary" class="glass-card"
                        style="padding: 24px; background: rgba(131, 56, 236, 0.04);">
                        <p>Seleziona un progetto per vedere i risultati.</p>
                    </div>
                </div>
            </section>

            <!-- Empty State -->
            <section id="empty-state" class="empty-state">
                <div class="glass-card" style="padding: 60px 40px; text-align: center; max-width: 500px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🎨</div>
                    <h2>Benvenuto nell'Admin</h2>
                    <p style="margin-top: 10px;">Seleziona un progetto o creane uno nuovo per iniziare.</p>
                </div>
            </section>
        </main>

        <!-- Create Project Modal -->
        <div id="modal-project" class="modal-overlay hidden">
            <div class="glass-card modal-content fade-in" style="max-width: 420px; width: 100%; padding: 40px;">
                <h2 style="margin-bottom: 5px;">Nuovo Progetto</h2>
                <p style="font-size: 0.9rem; margin-bottom: 30px;">Crea un progetto di stile da condividere.</p>
                <div class="input-group">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Nome
                            Progetto</label>
                        <input type="text" id="new-project-name" placeholder="es. Branding Studio XYZ"
                            style="width: 100%;" />
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Password
                            Utente</label>
                        <input type="text" id="new-project-pass" placeholder="Password per l'utente"
                            style="width: 100%;" />
                    </div>
                </div>
                <div style="margin-top: 30px; display: flex; gap: 12px; justify-content: flex-end;">
                    <button id="btn-cancel" class="btn-small" style="padding: 12px 24px;">Annulla</button>
                    <button id="btn-save-project" class="btn-primary" style="padding: 12px 28px;">Crea Progetto</button>
                </div>
            </div>
        </div>

        <!-- Lightbox -->
        <div id="lightbox-overlay" class="hidden" onclick="closeLightbox()"
            style="position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px;cursor:zoom-out;">
            <img id="lightbox-img" src="" alt=""
                style="max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;box-shadow:0 30px 60px rgba(0,0,0,0.5);"
                onclick="event.stopPropagation()" />
            <button onclick="closeLightbox()"
                style="position:fixed;top:20px;right:20px;background:rgba(255,255,255,0.1);border:none;color:white;font-size:1.5rem;width:44px;height:44px;border-radius:50%;cursor:pointer;backdrop-filter:blur(10px);">✕</button>
        </div>
    </div>

    <script type="module" src="/src/admin.js"></script>
</body>

</html>
